<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CA Simulator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="simulator-toolbar" aria-label="Simulator controls">
        <button type="button" onclick="fetch('/run', { method: 'POST' })">Run</button>
        <button type="button" onclick="fetch('/pause', { method: 'POST' })">Pause</button>
        <button type="button" onclick="fetch('/step', { method: 'POST' })">Step</button>
        <button type="button" onclick="fetch('/reset', { method: 'POST' })">Reset</button>
        <button type="button" onclick="fetch('/load', { method: 'POST' })">Load Program</button>
    </header>

    <div class="memory-panels-wrapper">
        <aside class="memory-panel" aria-labelledby="instruction-memory-title">
            <h2 id="instruction-memory-title" class="memory-title">Instruction Memory</h2>
            <div id="instruction-memory" class="memory-list">
                <!-- JS inserts instruction memory here -->
            </div>
        </aside>

        <aside class="memory-panel" aria-labelledby="data-memory-title">
            <h2 id="data-memory-title" class="memory-title">Data Memory</h2>
            <div id="data-memory" class="memory-list">
                <!-- JS inserts data memory here -->
            </div>
        </aside>
    </div>

    <script src="utils.js"></script>
    <script src="main.js"></script>
</body>
</html>
