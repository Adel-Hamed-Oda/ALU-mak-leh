<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CA OS Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="simulator-toolbar">
        <div style="font-weight: bold; font-size: 18px; margin-right: auto; color: var(--text-primary);">
            MeowArch Simulator
        </div>
        <div class="toolbar-actions">
            <button type="button" onclick="fetch('/run', { method: 'POST' })">Run</button>
            <button type="button" onclick="fetch('/pause', { method: 'POST' })">Pause</button>
            <button type="button" onclick="fetch('/step', { method: 'POST' })">Step</button>
            <button type="button" onclick="fetch('/reset', { method: 'POST' })">Reset</button>
            <button type="button" id="load-program-button">Load Program</button>
            <button type="button" id="settings-button">Settings</button>
        </div>
    </div>
    
    <div id="load-modal" class="modal hidden" aria-hidden="true">
        <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="load-modal-title">
            <div class="modal-header">
                <h3 id="load-modal-title">Select Program</h3>
                <button type="button" id="new-program-button" class="modal-icon-button" aria-label="New Program">+</button>
                <button type="button" id="close-load-modal" class="modal-close" aria-label="Close">X</button>
            </div>
            <div id="program-picker-view">
                <div id="program-list" class="program-list"></div>
                <button type="button" id="cancel-load-modal" class="cancel-btn">Cancel</button>
            </div>
            <form id="program-create-view" class="program-create-view hidden">
                <label class="program-field">
                    <span>File name</span>
                    <input id="program-filename" type="text" autocomplete="off" spellcheck="false" placeholder="program_2.txt">
                </label>
                <label class="program-field">
                    <span>Code</span>
                    <textarea id="program-code" spellcheck="false" rows="10"></textarea>
                </label>
                <div id="program-create-status" class="program-create-status" aria-live="polite"></div>
                <div class="program-create-actions">
                    <button type="button" id="back-to-program-list">Back</button>
                    <button type="submit" id="save-program-button">Save</button>
                </div>
            </form>
        </div>
    </div>

    <div id="settings-modal" class="modal hidden" aria-hidden="true">
        <div class="modal-content settings-modal-content" role="dialog" aria-modal="true" aria-labelledby="settings-modal-title">
            <div class="modal-header">
                <h3 id="settings-modal-title">Settings</h3>
                <button type="button" id="close-settings-modal" class="modal-close" aria-label="Close">X</button>
            </div>
            <div class="settings-content">
                <label class="settings-row">
                    <span>Registers</span>
                    <select id="register-format-select">
                        <option value="binary">Binary</option>
                        <option value="signed">Signed Integers</option>
                        <option value="unsigned">Unsigned Integers</option>
                    </select>
                </label>
                <label class="settings-row">
                    <span>Instructions</span>
                    <select id="instruction-format-select">
                        <option value="text">Text</option>
                        <option value="binary">Binary</option>
                    </select>
                </label>
                <label class="settings-row">
                    <span>Data</span>
                    <select id="data-format-select">
                        <option value="binary">Binary</option>
                        <option value="signed">Signed Integers</option>
                        <option value="unsigned">Unsigned Integers</option>
                    </select>
                </label>
            </div>
        </div>
    </div>

    <div class="memory-panels-wrapper">
        <div class="left-panels">
            <div style="display: flex; height: 100%; min-height: 0;">
                <div class="memory-panel">
                    <div class="memory-title">Instruction Memory</div>
                    <div id="instruction-memory"></div>
                </div>

                <div class="memory-panel">
                    <div class="memory-title">Data Memory</div>
                    <div id="data-memory"></div>
                </div>
            </div>
        </div>

        <div class="pipeline-panel">
            <div class="pipeline-title">Instruction Pipeline</div>
            <div id="pipeline-table">
                <table class="pipeline-grid">
                    <thead>
                        <tr>
                            <th>Cycle</th>
                            <th>Fetch (IF)</th>
                            <th>Decode (ID)</th>
                            <th>Execute (EX)</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
            
            <div style="margin-top: 12px;" class="pipeline-title">General Purpose Registers</div>
            <div class="sreg-panel">
                <span class="sreg-label">SREG</span>
                <span id="sreg-binary" class="sreg-binary">00000000</span>
                <span class="sreg-flags">C V N S Z</span>
            </div>
            <div class="registers-panel">
                <div id="registers" class="registers-grid"></div>
            </div>
        </div>
    </div>

    <script src="utils.js?v=9"></script>
    <script src="main.js?v=9"></script>
</body>
</html>
